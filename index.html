<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>User Feedback Form</h1>
<form id="feedbackForm">
<label for="name">Name:</label>
<input type="text" id="name" placeholder="Write your name here">
<span class="tooltip" id="nameTip">Please enter your full name</span>

<br><br>

<label for="email">Email:</label>
<input type="email" id="email" placeholder="Type your email here">
<span class="tooltip" id="emailTip">Enter a valid email</span>

<br><br>

<label for="comments">Comments:</label>

<textarea id="comments" placeholder="Tell me what you think"></textarea>

<span class="tooltip" id="commentTip">Limit 200 characters</span>

<p id="charCount">0 characters</p>

<button type="submit">Submit</button>

<p id="errorMessage"></p>

</form>

<h2>Submitted Feedback</h2>

<div id="feedback-display"></div>

<script src="cp_1.js"></script>

</body>
</html>
